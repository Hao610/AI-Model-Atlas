name: AI DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  # ===========================================================================
  # PHASE 1: Static Analysis — Dependency & Code Scanning
  # ===========================================================================
  static-analysis:
    name: "Phase 1 — Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install static analysis tools
        run: pip install pip-audit bandit

      - name: "Dependency Scan — pip-audit (CVE check)"
        run: |
          echo "🔍 Scanning dependencies for known CVEs..."
          pip-audit -r projects/rag-app/requirements.txt --format=columns
        # pip-audit exits non-zero if any CVE is found → pipeline fails

      - name: "Code Scan — Bandit (SAST)"
        run: |
          echo "🔍 Running Bandit SAST scan on rag-app core..."
          bandit -r projects/rag-app/core/ \
            --severity-level medium \
            --confidence-level medium \
            -f txt \
            --exit-zero
          # --exit-zero: report issues but do not block on LOW severity
          # Remove --exit-zero to enforce strict blocking on any finding

  # ===========================================================================
  # PHASE 2 & 3: Dynamic Testing — Adversarial Injection + Shadow Testing
  # ===========================================================================
  red-teaming:
    name: "Phase 2+3 — Red Teaming & Shadow Testing"
    runs-on: ubuntu-latest
    needs: static-analysis   # Only runs if Phase 1 passes
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f projects/rag-app/requirements.txt ]; then
            pip install -r projects/rag-app/requirements.txt
          fi
          pip install pytest

      - name: "Phase 1 (legacy) — Core Runtime Security Benchmarks"
        run: |
          echo "🛡️ Running core security unit tests..."
          cd projects/rag-app
          pytest tests/test_runtime.py -v --tb=short

      - name: "Phase 2 — Adversarial Injection Simulation"
        run: |
          echo "🔴 Running adversarial prompt injection tests..."
          cd projects/rag-app
          pytest tests/red_teaming/test_pipeline.py::TestAdversarialInjection \
            -v --tb=short \
            --junit-xml=../../reports/phase2_adversarial_results.xml
        # If ANY injection bypasses the guardrails, this step fails
        # and the PR is blocked from merging.

      - name: "Phase 3 — Shadow Testing (False Positive Rate)"
        run: |
          echo "👥 Replaying benign historical logs through guardrails..."
          cd projects/rag-app
          pytest tests/red_teaming/test_pipeline.py::TestShadowFalsePositives \
            -v --tb=short \
            --junit-xml=../../reports/phase3_shadow_results.xml
        # If ANY benign message is blocked (FP > 0), this step fails.
        # This ensures rule changes don't break legitimate user traffic.

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()   # Upload even on failure so we can inspect results
        with:
          name: red-teaming-reports
          path: reports/
          retention-days: 30
