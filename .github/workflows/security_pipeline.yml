name: AI DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  security-benchmark:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f projects/rag-app/requirements.txt ]; then pip install -r projects/rag-app/requirements.txt; fi
        pip install pytest

    - name: Run Security Benchmarks
      run: |
        cd projects/rag-app
        pytest tests/test_runtime.py -v
